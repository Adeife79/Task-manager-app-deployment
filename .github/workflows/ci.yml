name: Terraform Infrastructure

on:
  workflow_dispatch:
    push:
        branches: ["master"]
        paths:
          - 'aws-infra/**'
        

jobs:
    terraform:
        runs-on: ubuntu-latest

        permissions:
            id-token: write   # REQUIRED for OIDC
            contents: read

      #  outputs:
      #    EC2_IP: ${{steps.get_ip.outputs.ec2_public_ip}}

        env:
            AWS_REGION: us-east-1
            S3_BUCKET_NAME: "todo-app-tf-state-bucket"

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::749929394992:role/gh-actions-role 
                aws-region: ${{env.AWS_REGION}}

            - name: Create S3 Backend
              run: |
                 aws s3api create-bucket --bucket "${{ env.S3_BUCKET_NAME}}" --region us-east-1 

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              run: |
                cd aws-infra
                terraform init -backend-config="bucket=${{env.S3_BUCKET_NAME}}" -backend-config="region=${{env.AWS_REGION}}"

            - name: Terraform Plan
              run: |
                cd aws-infra
                terraform plan

            - name: Terraform Apply
              run: |
                cd aws-infra
                terraform apply -auto-approve

                EC2_IP=$(terraform output -raw todo_public_ip)
                echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV

    